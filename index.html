<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />

    <meta name="theme-color" content="#075E54" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/icons/favicon.png" />
    <link rel="apple-touch-icon" href="/icons/favicon1.png" />

    <!-- SEO -->
    <meta name="description" content="Kenali dirimu, temukan arahmu, bangun masa depanmu." />
    <title>Verneks</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Unregister SW & clear cache SEBELUM app load — fix stuck loading -->
    <script>
      (function() {
        // Clear semua SW dan cache saat halaman dibuka
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(r) { r.unregister(); });
          });
        }
        if ('caches' in window) {
          caches.keys().then(function(keys) {
            keys.forEach(function(k) { caches.delete(k); });
          });
        }
        // Cek token Supabase — kalau expired, hapus langsung sebelum getSession
        var now = Date.now()
        var sbKeys = Object.keys(localStorage).filter(function(k) { return k.startsWith('sb-'); })
        sbKeys.forEach(function(k) {
          try {
            var val = JSON.parse(localStorage.getItem(k))
            // Supabase session punya expires_at (unix timestamp detik)
            var expiresAt = val && val.expires_at ? val.expires_at * 1000 : null
            if (expiresAt && expiresAt < now) {
              console.log('[Verneks] Token expired, hapus:', k)
              localStorage.removeItem(k)
            }
          } catch(e) {
            // Kalau tidak bisa di-parse, hapus juga
            localStorage.removeItem(k)
          }
        })
        localStorage.setItem('vk_last_active', now.toString())
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
