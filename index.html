    <!-- ═══ SEMUA JSON-LD (Organization, WebSite, SoftwareApplication, FAQ, Breadcrumb, dst)
         SEKARANG DIHASILKAN OLEH useSEO() — lihat src/seo/useSEO.js
         Single Source of Truth: satu halaman = satu pemanggilan useSEO() = satu set schema.
         JANGAN tambah JSON-LD statis di sini lagi. ═══════════════════════════════════ -->
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function() {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(r) { r.unregister(); });
          });
        }
        if ('caches' in window) {
          caches.keys().then(function(keys) {
            keys.forEach(function(k) { caches.delete(k); });
          });
        }
        var now = Date.now()
        var sbKeys = Object.keys(localStorage).filter(function(k) { return k.startsWith('sb-'); })
        sbKeys.forEach(function(k) {
          try {
            var val = JSON.parse(localStorage.getItem(k))
            var expiresAt = val && val.expires_at ? val.expires_at * 1000 : null
            if (expiresAt && expiresAt < now) { localStorage.removeItem(k) }
          } catch(e) { localStorage.removeItem(k) }
        })
        localStorage.setItem('vk_last_active', now.toString())
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
